name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r quant-agent-trader/requirements.txt
          pip install -r quant-agent-trader/requirements-test.txt
      
      - name: Run unit tests
        run: |
          cd quant-agent-trader
          pytest tests/unit -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing --no-cov-on-fail -x
      
      - name: Run integration tests
        run: |
          cd quant-agent-trader
          pytest tests/integration -v --tb=short -x
      
      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./quant-agent-trader/coverage.xml
          fail_ci_if_error: false
          threshold: 70%
      
      - name: Generate coverage report
        run: |
          cd quant-agent-trader
          coverage report --show-missing --skip-covered

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          pip install ruff mypy
      
      - name: Run ruff linter
        run: |
          cd quant-agent-trader
          ruff check . --output-format=github
      
      - name: Run mypy type checker
        run: |
          cd quant-agent-trader
          mypy . --ignore-missing-imports --no-error-summary || true

  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check for vulnerabilities
        run: |
          pip install safety bandit
          safety check || true
          bandit -r quant-agent-trader --format github || true

  notify:
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    
    steps:
      - name: Create summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: ${{ needs.test.outputs.unit_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests: ${{ needs.test.outputs.integration_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: ${{ needs.lint.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.outputs.status }}" >> $GITHUB_STEP_SUMMARY
