[lint]
extend-select = [
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "FA",   # flake8-future-annotations
    "I",    # isort
    "ICN",  # import convention
    "PIE",  # flake8-pie
    "T20",  # flake8-print
    "PT",   # flake8-pytest-style
    "RSE",  # flake8-raise
    "RET",  # flake8-return
    "SIM",  # flake8-simplify
    "PTH",  # flake8-use-pathlib
    "PERF",  # perflint
    "RUF",  # ruff-specific
]

ignore = [
    "B008",   # do not perform function calls in argument defaults
    "C901",   # too complex
    "E501",   # line too long (handled by formatter)
    "FA102",  # from __future__ import annotations
    "PT001",  # pytest fixture syntax
    "PT004",  # fixture underscore naming
    "RSE102", # exception raising
    "SIM115", # use context handler for opening files
    "PTH",    # pathlib is not required for all cases
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["PT", "B011", "S101"]
"examples/*" = ["T20"]

[lint.isort]
known-first-party = ["agents", "config", "data", "features", "learning", "models", "portfolio", "signals", "strategies", "utils"]

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
