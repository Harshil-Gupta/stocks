version: "3.9"

services:
  quant-trader:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --NotebookApp.token=""
    ports:
      - "8888:8888"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
    profiles:
      - jupyter

networks:
  default:
    name: quant-network
